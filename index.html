<!DOCTYPE html>
<html>
<head>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <title></title>

     <style>
         img{
             width: 100%;
             border-radius: 10px;
             box-shadow: 0 10px 10px rgba(0,0,0,5.2);
         }
         .producto{
         	background: white;
         	padding: 20px;
         	border-radius: 10px;
         	width: 200px;
         	box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
         }
         .container {
         	display: flex;
         	justify-content: center;
         	gap: 20px;
         	margin-top: 50px;
         }
     </style>
</head>
<body>
<img src="banner.png">
<br>
<h1>Tienda de Camisetas</h1>
<br>
<div class="container">

<div class="producto">
	<img src="images1.png" width="200px" alt="Camiseta 1">
	<h2>Camiseta Blanca</h2>
	<p class="precio">15€</p>
	<button>Comprar</button>
</div>

<div class="producto2">
	<img src="images2.png" width="200px" alt="Camiseta 2">
	<h2>Camiseta Blanca</h2>
	<p class="precio">25€</p>
	<button>Comprar</button>
</div>

<div class="producto3">
	<img src="images3.png" width="200px" alt="Camiseta 3">
	<h2>Camiseta Blanca</h2>
	<p class="precio">35€</p>
	<button>Comprar</button>
</div>
</div>
</body>
</html>
